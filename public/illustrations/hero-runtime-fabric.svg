<svg width="1200" height="860" viewBox="0 0 1200 860" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="hero-fabric-title hero-fabric-desc">
  <title id="hero-fabric-title">LocalCloud runtime fabric illustration</title>
  <desc id="hero-fabric-desc">A detailed isometric illustration showing LocalCloud as a layered runtime fabric with gateway, facades, external emulators, and persistence using service icons.</desc>
  <defs>
    <linearGradient id="hrf-bg" x1="0" y1="0" x2="1200" y2="860" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FCFEFF"/>
      <stop offset="1" stop-color="#EAF3FF"/>
    </linearGradient>
    <filter id="hrf-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="24" flood-color="#6A8FCC" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="1200" height="860" rx="34" fill="url(#hrf-bg)"/>
  <circle cx="176" cy="132" r="140" fill="#DBE8FF" fill-opacity="0.4"/>
  <circle cx="1044" cy="700" r="172" fill="#DBE8FF" fill-opacity="0.3"/>

  <g opacity="0.42" stroke="#D1DFF3" stroke-width="1.2">
    <path d="M98 694L316 572L618 664L922 558L1110 632"/>
    <path d="M138 252L346 336L602 248L908 320L1072 268"/>
  </g>

  <g transform="translate(74 120)">
    <rect width="186" height="42" rx="21" fill="#FFFFFF" stroke="#D4E2F4" stroke-width="2"/>
    <text x="26" y="27" fill="#2C72F6" font-family="IBM Plex Mono, monospace" font-size="13" letter-spacing="1.4">RUNTIME FABRIC</text>
  </g>

  <g transform="translate(258 148)" filter="url(#hrf-shadow)">
    <polygon points="116,0 412,134 184,246 -112,112" fill="#F0F6FF" stroke="#D4E2F4" stroke-width="2"/>
    <polygon points="-112,112 -112,238 184,372 184,246" fill="#E0EBFD" stroke="#D4E2F4" stroke-width="2"/>
    <polygon points="412,134 412,260 184,372 184,246" fill="#D2E2FA" stroke="#D4E2F4" stroke-width="2"/>

    <polygon points="116,68 358,176 184,258 -58,150" fill="#FFFFFF" stroke="#D4E2F4" stroke-width="2"/>
    <text x="120" y="164" fill="#6B7F9D" font-family="IBM Plex Mono, monospace" font-size="13" letter-spacing="1.4" text-anchor="middle">TOP LAYER</text>
    <text x="186" y="198" fill="#12233D" font-family="IBM Plex Sans, sans-serif" font-size="28" font-weight="600" text-anchor="middle">Armeria gateway</text>
    <text x="186" y="224" fill="#58708F" font-family="IBM Plex Sans, sans-serif" font-size="18" text-anchor="middle">Admin API · Web Console · Env export</text>

    <polygon points="116,178 358,286 184,368 -58,260" fill="#F8FBFF" stroke="#D4E2F4" stroke-width="2"/>
    <text x="120" y="272" fill="#6B7F9D" font-family="IBM Plex Mono, monospace" font-size="13" letter-spacing="1.4" text-anchor="middle">MIDDLE LAYER</text>
    <text x="186" y="306" fill="#12233D" font-family="IBM Plex Sans, sans-serif" font-size="28" font-weight="600" text-anchor="middle">Facade services</text>
    <text x="186" y="332" fill="#58708F" font-family="IBM Plex Sans, sans-serif" font-size="18" text-anchor="middle">Secrets · Tasks · Logs · Monitoring · Workflows</text>

    <polygon points="116,290 358,398 184,480 -58,372" fill="#FFFFFF" stroke="#D4E2F4" stroke-width="2"/>
    <text x="126" y="384" fill="#6B7F9D" font-family="IBM Plex Mono, monospace" font-size="13" letter-spacing="1.4" text-anchor="middle">BASE LAYER</text>
    <text x="186" y="418" fill="#12233D" font-family="IBM Plex Sans, sans-serif" font-size="28" font-weight="600" text-anchor="middle">External emulators</text>
    <text x="186" y="444" fill="#58708F" font-family="IBM Plex Sans, sans-serif" font-size="18" text-anchor="middle">GCS · Pub/Sub · Firestore · Bigtable · Spanner · BigQuery</text>
  </g>

  <g transform="translate(160 258)">
    <rect width="90" height="90" rx="24" fill="#FFFFFF" stroke="#D4E2F4" stroke-width="2"/>
    <image href="../icons/gcs.svg" x="27" y="26" width="36" height="36"/>
    <text x="45" y="72" fill="#2C72F6" font-family="IBM Plex Mono, monospace" font-size="10" text-anchor="middle">GCS</text>
  </g>
  <g transform="translate(104 378)">
    <rect width="90" height="90" rx="24" fill="#FFFFFF" stroke="#D4E2F4" stroke-width="2"/>
    <image href="../icons/pubsub.svg" x="27" y="26" width="36" height="36"/>
    <text x="45" y="72" fill="#2C72F6" font-family="IBM Plex Mono, monospace" font-size="10" text-anchor="middle">PUBSUB</text>
  </g>
  <g transform="translate(908 210)">
    <rect width="90" height="90" rx="24" fill="#FFFFFF" stroke="#D4E2F4" stroke-width="2"/>
    <image href="../icons/bigquery.svg" x="27" y="26" width="36" height="36"/>
    <text x="45" y="72" fill="#2C72F6" font-family="IBM Plex Mono, monospace" font-size="10" text-anchor="middle">BQ</text>
  </g>
  <g transform="translate(980 336)">
    <rect width="90" height="90" rx="24" fill="#FFFFFF" stroke="#D4E2F4" stroke-width="2"/>
    <image href="../icons/spanner.svg" x="27" y="26" width="36" height="36"/>
    <text x="45" y="72" fill="#2C72F6" font-family="IBM Plex Mono, monospace" font-size="10" text-anchor="middle">SPANNER</text>
  </g>
  <g transform="translate(898 462)">
    <rect width="90" height="90" rx="24" fill="#FFFFFF" stroke="#D4E2F4" stroke-width="2"/>
    <image href="../icons/secretmanager.svg" x="27" y="26" width="36" height="36"/>
    <text x="45" y="72" fill="#2C72F6" font-family="IBM Plex Mono, monospace" font-size="9.5" text-anchor="middle">SECRETS</text>
  </g>

  <g transform="translate(858 612)" filter="url(#hrf-shadow)">
    <rect width="248" height="124" rx="26" fill="#0F1C30"/>
    <text x="28" y="40" fill="#8BA6D3" font-family="IBM Plex Mono, monospace" font-size="14" letter-spacing="1.5">PERSISTENCE + STATE</text>
    <text x="28" y="76" fill="#F5F9FF" font-family="IBM Plex Sans, sans-serif" font-size="28" font-weight="600">PostgreSQL 17</text>
    <text x="28" y="104" fill="#C4D7F8" font-family="IBM Plex Sans, sans-serif" font-size="18">Facade state, logs, metrics, workflow data</text>
  </g>

  <g transform="translate(76 640)" filter="url(#hrf-shadow)">
    <rect width="314" height="96" rx="24" fill="#FFFFFF" stroke="#D4E2F4" stroke-width="2"/>
    <text x="28" y="40" fill="#6B7F9D" font-family="IBM Plex Mono, monospace" font-size="13" letter-spacing="1.5">WHY THIS SHAPE</text>
    <text x="28" y="74" fill="#12233D" font-family="IBM Plex Sans, sans-serif" font-size="24" font-weight="600">One runtime, many service boundaries</text>
  </g>
</svg>
