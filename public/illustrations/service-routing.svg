<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="service-routing-title service-routing-desc">
  <title id="service-routing-title">LocalCloud service registry and routing</title>
  <desc id="service-routing-desc">A diagram showing services.yaml as the single source of truth feeding environment export, service enable flags, and gateway routing to facades and external emulators.</desc>
  <defs>
    <linearGradient id="sr-bg" x1="0" y1="0" x2="1200" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FBFDFF"/>
      <stop offset="1" stop-color="#ECF3FF"/>
    </linearGradient>
    <linearGradient id="sr-blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2C72F6"/>
      <stop offset="1" stop-color="#7AA7FF"/>
    </linearGradient>
    <filter id="sr-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#6A8FCC" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1200" height="760" rx="32" fill="#F3F8FE"/>
  <circle cx="154" cy="100" r="130" fill="#DBE8FF" fill-opacity="0.42"/>
  <circle cx="1028" cy="642" r="150" fill="#DBE8FF" fill-opacity="0.32"/>

  <g filter="url(#sr-shadow)">
    <rect x="90" y="70" width="1020" height="620" rx="30" fill="url(#sr-bg)" stroke="#CADBF1" stroke-width="2"/>
  </g>

  <rect x="122" y="102" width="282" height="556" rx="28" fill="#FFFFFF" stroke="#D4E2F4" stroke-width="2"/>
  <text x="150" y="140" fill="#6B7F9D" font-family="IBM Plex Mono, monospace" font-size="15" letter-spacing="1.8">SINGLE SOURCE OF TRUTH</text>
  <text x="150" y="180" fill="#12233D" font-family="IBM Plex Sans, sans-serif" font-size="34" font-weight="600">services.yaml</text>
  <text x="150" y="214" fill="#58708F" font-family="IBM Plex Sans, sans-serif" font-size="19">Every service is described once, then reused by the gateway, env export, and docs.</text>

  <rect x="150" y="248" width="226" height="56" rx="18" fill="#F8FBFF" stroke="#D7E5F6" stroke-width="2"/>
  <text x="170" y="282" fill="#12233D" font-family="IBM Plex Sans, sans-serif" font-size="21" font-weight="600">port + additionalPorts</text>

  <rect x="150" y="320" width="226" height="56" rx="18" fill="#F8FBFF" stroke="#D7E5F6" stroke-width="2"/>
  <text x="170" y="354" fill="#12233D" font-family="IBM Plex Sans, sans-serif" font-size="21" font-weight="600">protocol + type</text>

  <rect x="150" y="392" width="226" height="56" rx="18" fill="#F8FBFF" stroke="#D7E5F6" stroke-width="2"/>
  <text x="170" y="426" fill="#12233D" font-family="IBM Plex Sans, sans-serif" font-size="21" font-weight="600">envVar + envValuePrefix</text>

  <rect x="150" y="464" width="226" height="56" rx="18" fill="#F8FBFF" stroke="#D7E5F6" stroke-width="2"/>
  <text x="170" y="498" fill="#12233D" font-family="IBM Plex Sans, sans-serif" font-size="21" font-weight="600">defaultEnabled</text>

  <rect x="150" y="536" width="226" height="84" rx="18" fill="#0F1C30"/>
  <text x="170" y="568" fill="#8BA6D3" font-family="IBM Plex Mono, monospace" font-size="13" letter-spacing="1.5">EXAMPLES</text>
  <text x="170" y="598" fill="#F5F9FF" font-family="IBM Plex Sans, sans-serif" font-size="19">gcs :4443 rest external</text>
  <text x="170" y="622" fill="#F5F9FF" font-family="IBM Plex Sans, sans-serif" font-size="19">secretmanager :8080 grpc facade</text>

  <rect x="472" y="116" width="248" height="114" rx="24" fill="#FFFFFF" stroke="#D4E2F4" stroke-width="2"/>
  <text x="498" y="150" fill="#6B7F9D" font-family="IBM Plex Mono, monospace" font-size="14" letter-spacing="1.6">ENTRYPOINT PARSING</text>
  <text x="498" y="186" fill="#12233D" font-family="IBM Plex Sans, sans-serif" font-size="28" font-weight="600">LOCALCLOUD_SERVICES</text>
  <text x="498" y="214" fill="#58708F" font-family="IBM Plex Sans, sans-serif" font-size="18">Expands to LOCALCLOUD_ENABLE_* flags before supervisord starts processes.</text>

  <rect x="472" y="278" width="248" height="124" rx="24" fill="#FFFFFF" stroke="#D4E2F4" stroke-width="2"/>
  <text x="498" y="312" fill="#6B7F9D" font-family="IBM Plex Mono, monospace" font-size="14" letter-spacing="1.6">ENV EXPORT</text>
  <text x="498" y="348" fill="#12233D" font-family="IBM Plex Sans, sans-serif" font-size="28" font-weight="600">/_localcloud/env</text>
  <text x="498" y="376" fill="#58708F" font-family="IBM Plex Sans, sans-serif" font-size="18">Builds STORAGE_EMULATOR_HOST, PUBSUB_EMULATOR_HOST, and friends directly from the registry.</text>

  <rect x="472" y="450" width="248" height="164" rx="24" fill="#FFFFFF" stroke="#D4E2F4" stroke-width="2"/>
  <text x="498" y="484" fill="#6B7F9D" font-family="IBM Plex Mono, monospace" font-size="14" letter-spacing="1.6">GATEWAY ROUTING</text>
  <text x="498" y="520" fill="#12233D" font-family="IBM Plex Sans, sans-serif" font-size="28" font-weight="600">Port + protocol decisions</text>
  <text x="498" y="550" fill="#58708F" font-family="IBM Plex Sans, sans-serif" font-size="18">The gateway knows which services stay on :8080 and which use direct host ports.</text>
  <text x="498" y="584" fill="#58708F" font-family="IBM Plex Sans, sans-serif" font-size="18">Facade services route in-process; external emulators route by declared host port and health check.</text>

  <rect x="790" y="112" width="286" height="156" rx="26" fill="#0F1C30"/>
  <text x="818" y="148" fill="#8BA6D3" font-family="IBM Plex Mono, monospace" font-size="14" letter-spacing="1.6">DEVELOPER SURFACE</text>
  <text x="818" y="186" fill="#F5F9FF" font-family="IBM Plex Sans, sans-serif" font-size="30" font-weight="600">Existing SDKs</text>
  <text x="818" y="216" fill="#C4D7F8" font-family="IBM Plex Sans, sans-serif" font-size="18">Python, Node, Java, Go</text>
  <text x="818" y="246" fill="#C4D7F8" font-family="IBM Plex Sans, sans-serif" font-size="18">No code branching, just env handoff</text>

  <rect x="790" y="298" width="286" height="142" rx="26" fill="#FFFFFF" stroke="#D4E2F4" stroke-width="2"/>
  <text x="818" y="332" fill="#6B7F9D" font-family="IBM Plex Mono, monospace" font-size="14" letter-spacing="1.6">FACADE TARGETS</text>
  <text x="818" y="368" fill="#12233D" font-family="IBM Plex Sans, sans-serif" font-size="28" font-weight="600">Gateway :8080</text>
  <text x="818" y="398" fill="#58708F" font-family="IBM Plex Sans, sans-serif" font-size="18">Secret Manager</text>
  <text x="818" y="424" fill="#58708F" font-family="IBM Plex Sans, sans-serif" font-size="18">Cloud Tasks, Logging, Monitoring</text>

  <rect x="790" y="470" width="286" height="156" rx="26" fill="#FFFFFF" stroke="#D4E2F4" stroke-width="2"/>
  <text x="818" y="504" fill="#6B7F9D" font-family="IBM Plex Mono, monospace" font-size="14" letter-spacing="1.6">EXTERNAL TARGETS</text>
  <text x="818" y="540" fill="#12233D" font-family="IBM Plex Sans, sans-serif" font-size="28" font-weight="600">Direct host ports</text>
  <text x="818" y="570" fill="#58708F" font-family="IBM Plex Sans, sans-serif" font-size="18">GCS :4443, Pub/Sub :8085, Firestore :8086</text>
  <text x="818" y="596" fill="#58708F" font-family="IBM Plex Sans, sans-serif" font-size="18">Bigtable :8087, Spanner :9010/9020, BigQuery :9050/9060</text>

  <path d="M404 180H452" stroke="#7DA4E6" stroke-width="4" stroke-linecap="round"/>
  <path d="M404 424H452" stroke="#7DA4E6" stroke-width="4" stroke-linecap="round"/>
  <path d="M404 576H452" stroke="#7DA4E6" stroke-width="4" stroke-linecap="round"/>

  <path d="M720 174H764" stroke="#2C72F6" stroke-width="5" stroke-linecap="round"/>
  <path d="M720 340H764" stroke="#2C72F6" stroke-width="5" stroke-linecap="round"/>
  <path d="M720 532H764" stroke="#2C72F6" stroke-width="5" stroke-linecap="round"/>

  <path d="M446 174L470 174" stroke="#2C72F6" stroke-width="5" stroke-linecap="round"/>
  <path d="M446 340L470 340" stroke="#2C72F6" stroke-width="5" stroke-linecap="round"/>
  <path d="M446 532L470 532" stroke="#2C72F6" stroke-width="5" stroke-linecap="round"/>

  <text x="436" y="164" fill="#6B7F9D" font-family="IBM Plex Mono, monospace" font-size="12" letter-spacing="1.3">flags</text>
  <text x="432" y="330" fill="#6B7F9D" font-family="IBM Plex Mono, monospace" font-size="12" letter-spacing="1.3">env</text>
  <text x="424" y="522" fill="#6B7F9D" font-family="IBM Plex Mono, monospace" font-size="12" letter-spacing="1.3">routing</text>
</svg>
