<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="localcloud-social-title localcloud-social-desc">
  <title id="localcloud-social-title">LocalCloud social card</title>
  <desc id="localcloud-social-desc">Brand card for LocalCloud, a local Google Cloud runtime in one container.</desc>
  <defs>
    <linearGradient id="card-bg" x1="80" y1="40" x2="1110" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FBFF"/>
      <stop offset="0.55" stop-color="#EAF2FF"/>
      <stop offset="1" stop-color="#D7E7FF"/>
    </linearGradient>
    <linearGradient id="card-blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#67A4FF"/>
      <stop offset="0.45" stop-color="#1A73E8"/>
      <stop offset="1" stop-color="#0B57D0"/>
    </linearGradient>
    <filter id="card-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#0B57D0" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#card-bg)"/>
  <path d="M0 0h1200v630H0z" fill="none"/>
  <g opacity="0.38">
    <path d="M0 104h1200M0 184h1200M0 264h1200M0 344h1200M0 424h1200M0 504h1200" stroke="#B8C9E6"/>
    <path d="M120 0v630M240 0v630M360 0v630M480 0v630M600 0v630M720 0v630M840 0v630M960 0v630M1080 0v630" stroke="#B8C9E6"/>
  </g>
  <circle cx="1000" cy="132" r="230" fill="#1A73E8" opacity="0.1"/>
  <circle cx="1068" cy="530" r="190" fill="#34A853" opacity="0.09"/>

  <g transform="translate(104 124)">
    <rect x="0" y="0" width="150" height="150" rx="42" fill="url(#card-blue)" filter="url(#card-shadow)"/>
    <rect x="12" y="12" width="126" height="126" rx="34" fill="none" stroke="#FFFFFF" stroke-opacity="0.24" stroke-width="3"/>
    <path d="M50 86c-15 0-27-10-27-24 0-12 10-22 23-24 4-18 19-30 38-30 17 0 32 10 38 25 15 3 25 14 25 27 0 15-13 26-29 26H50Z" fill="#F8FBFF"/>
    <rect x="43" y="75" width="64" height="43" rx="14" fill="#E8F0FE" stroke="#A8C7FA" stroke-width="3"/>
    <path d="M58 91h31M58 103h20" stroke="#1A73E8" stroke-width="7" stroke-linecap="round"/>
    <circle cx="98" cy="104" r="7" fill="#34A853"/>
    <circle cx="36" cy="38" r="7" fill="#FBBC04"/>
    <circle cx="116" cy="42" r="7" fill="#EA4335"/>
  </g>

  <text x="292" y="200" fill="#13233D" font-family="IBM Plex Sans, Avenir Next, sans-serif" font-size="84" font-weight="700" letter-spacing="-4">Local</text>
  <text x="520" y="200" fill="#1A73E8" font-family="IBM Plex Sans, Avenir Next, sans-serif" font-size="84" font-weight="700" letter-spacing="-4">Cloud</text>
  <text x="296" y="252" fill="#6B7F9D" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="24" font-weight="500" letter-spacing="4">GOOGLE CLOUD IN-A-BOX</text>
  <text x="104" y="372" fill="#13233D" font-family="IBM Plex Sans, Avenir Next, sans-serif" font-size="48" font-weight="650" letter-spacing="-1.5">Run major Google Cloud services locally.</text>
  <text x="104" y="430" fill="#556A86" font-family="IBM Plex Sans, Avenir Next, sans-serif" font-size="29">One Docker container. Same SDKs. No cloud spend during local development.</text>

  <g transform="translate(104 494)" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="18" font-weight="600" letter-spacing="1.7">
    <rect x="0" y="0" width="198" height="48" rx="24" fill="#FFFFFF" stroke="#C5D7F2"/>
    <text x="28" y="31" fill="#1A73E8">SINGLE CONTAINER</text>
    <rect x="220" y="0" width="194" height="48" rx="24" fill="#FFFFFF" stroke="#C5D7F2"/>
    <text x="248" y="31" fill="#188038">ZERO CODE CHANGES</text>
    <rect x="436" y="0" width="160" height="48" rx="24" fill="#FFFFFF" stroke="#C5D7F2"/>
    <text x="464" y="31" fill="#0B57D0">LOCAL CONSOLE</text>
  </g>
</svg>
